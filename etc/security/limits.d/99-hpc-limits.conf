# /etc/security/limits.d/99-hpc-limits.conf
#
# 为 HPC/科学计算场景调整 PAM session 的资源限制。
# 通过 pam_limits 生效,覆盖所有经 PAM 登录的 session
# (sshd, login, su, sudo, cron 等)。
#
# 验证:
#   ssh localhost 'ulimit -s -n'
#
# 不覆盖:
#   - systemd service (走 LimitSTACK=/LimitNOFILE= 等配置)
#   - 容器内进程 (除非挂载本文件)
#
# ---------------------------------------------------------------------------
# stack size
# ---------------------------------------------------------------------------
# 原因: VASP 及大型 Fortran MPI 程序默认 8MB stack 易段错误。
#   https://www.vasp.at/forum/viewtopic.php?f=2&t=18265#p20893
# 添加日期: 2026-04-16
*        soft   stack      unlimited
*        hard   stack      unlimited

# ---------------------------------------------------------------------------
# open files (nofile)
# ---------------------------------------------------------------------------
# 原因: Linux 历史默认 1024 太低,容易被以下场景撞爆:
#   - MPI 多 rank 通信 (每 rank 多 socket + 多文件)
#   - HDF5 / h5py 并发数据集
#   - 大型 IDE / LSP / tmux
#   - 浏览器多 tab
# 注意: nofile 不使用 unlimited——某些内核会解释成极大数,
#   导致遍历 FD 的程序 (systemd, 部分 MPI) 启动缓慢。
# 添加日期: 2026-04-16
*        soft   nofile     65536
*        hard   nofile     1048576
