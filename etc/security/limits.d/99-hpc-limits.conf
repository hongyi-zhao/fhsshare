# /etc/security/limits.d/99-hpc-limits.conf
#
# 为 HPC/科学计算场景调整 PAM session 的资源限制。
#
# === 本机所有用户进程的 rlimit 真实来源 ===
#
# 通过 pam_limits.so 生效。下列 PAM service 都启用了 pam_limits
# 并会读取本目录的配置:
#
#   - sshd                (/etc/pam.d/sshd)              ssh 远程登录
#   - login               (/etc/pam.d/login)             TTY 登录
#   - su / sudo           (/etc/pam.d/{su,sudo})         切换用户
#   - cron                (/etc/pam.d/cron)              定时任务
#   - gdm-password 等     (/etc/pam.d/gdm-*)             GUI 图形登录
#   - systemd-user        (/usr/lib/pam.d/systemd-user)  关键链路 !
#                         user@UID.service 启动时通过
#                         PAMName=systemd-user 调用,使得 GNOME 终端
#                         等所有 GUI 桌面子进程都经此继承 limits
#
# 验证:
#   ssh localhost 'ulimit -s -n'                 # 走 sshd PAM
#   pstree -ps $$                                 # 追溯进程链
#   for p in $(pstree -ps $$ | grep -oE '[0-9]+'); do
#     grep -E '^Max stack|^Max open files' /proc/$p/limits 2>/dev/null
#   done
#
# === 不覆盖的场景 ===
#
# 以下路径**不经过 PAM**,走各自的机制:
#   - 系统 service (slurmd, nginx, docker 等): unit 文件的 Limit*=
#   - 容器内进程: 宿主不挂载本文件则无效
#   - 内核默认 / init (PID 1): 编译时或 systemd 启动早期决定
#
# === 与 systemd unit Limit*= 的关系 ===
#
# systemctl show user@1000.service 会显示 LimitSTACKSoft=8388608 (8MB),
# 但实际 systemd --user 进程 stack 是 unlimited。原因:
# user@.service 启动时先应用 unit 的 Limit*=,然后 PAM systemd-user
# 被调用, pam_limits 读本文件并**覆盖** systemd 设的 soft 值。
# PAM 在 setrlimit 链路上后执行,因此最终胜出。
# 这也是本配置文件对 GUI session 起作用的真正机制。
#
# === 与 ~/.bashrc 里 ulimit 的关系 ===
#
# 正常情况下 bash 启动时 stack/nofile hard 已由 PAM 设好,
# .bashrc 里 ulimit 是冗余的。但两种例外必须 shell 层兜底:
#
# 1) GNOME 终端 (gnome-terminal-server) 在 fork bash 前会调用
#    setrlimit(RLIMIT_NOFILE, 1024),防止旧的 select(2) 使用者
#    撞到 FD_SETSIZE=1024 导致 fd_set 溢出。所以 GUI 终端里
#    直接 ulimit -n 会显示 1024,而 ssh 进来是 65536。
#    .bashrc 里用 `ulimit -Sn $(ulimit -Hn)` 把 soft 拉回 hard,
#    消除这个不一致。
#
# 2) 迁移到无 PAM/无 systemd 环境 (容器、WSL、某些 HPC 节点) 时,
#    本文件失效,.bashrc 的 ulimit 成为唯一兜底。
#
# === rlimit 设置的优先级 (本机观察到的实际顺序) ===
#
#   内核默认
#     ↓ 被覆盖
#   systemd 自身配置 (/etc/systemd/system.conf)
#     ↓ 被覆盖
#   systemd unit 的 Limit*= (对 PID 1 直接启动的 service 生效)
#     ↓ 被覆盖 (如果 service 经过 PAM, 如 user@.service)
#   PAM pam_limits.so (读本文件)
#     ↓ 可能被覆盖
#   用户态程序自己调 setrlimit (如 glib/gnome-terminal 的 fork 前降级)
#     ↓ 可能被覆盖
#   shell 内 ulimit 命令 (用户显式调整, .bashrc 等)
#
# ---------------------------------------------------------------------------
# stack: 解除限制,避免 VASP 等大型 Fortran MPI 程序段错误
# https://www.vasp.at/forum/viewtopic.php?f=2&t=18265#p20893
# ---------------------------------------------------------------------------
*        soft   stack      unlimited
*        hard   stack      unlimited

# ---------------------------------------------------------------------------
# nofile: Linux 历史默认 1024 太低,不够 MPI/HDF5/IDE 用
# 不用 unlimited 以避免遍历 FD 的程序 (systemd, 部分 MPI) 启动缓慢
# 注意: GUI 终端里 soft 可能被 glib 降回 1024,需要 .bashrc 兜底
# ---------------------------------------------------------------------------
*        soft   nofile     65536
*        hard   nofile     1048576

# 添加日期: 2026-04-16
# 最后更新: 2026-04-17 (补充 systemd-user 链路、glib 降级、优先级说明)
